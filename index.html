<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Sandık Sayacı</title>

<style>
  body {
    background: radial-gradient(circle at top, #161b22, #0d1117 60%);
    color: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    position: relative;
  }

  #content {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 440px;
    max-width: 95%;
  }

  /* Üst bilgi kart */
  #topInfo {
    width: 100%;
    background: #161b22;
    border-radius: 14px;
    padding: 16px 20px;
    margin-bottom: 25px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    box-shadow: 0 0 25px rgba(0,0,0,0.4);
  }

  #coinLine {
    font-size: 1.6em;
    font-weight: bold;
    color: #00ff88;
    letter-spacing: 0.5px;
    word-break: break-word;
  }

  #senderLine {
    font-size: 1.2em;
    color: #b3b3b3;
    word-break: break-word;
  }

  #countdown {
    font-size: 4.5em;
    font-weight: bold;
    letter-spacing: 2px;
    margin-bottom: 10px;
  }

  #message {
    color: #888;
    font-size: 1rem;
    margin-bottom: 20px;
  }

  #edgeBox {
    padding: 14px 24px;
    background: #111;
    border-radius: 14px;
    display: none;
    font-size: 1.4em;
    font-weight: bold;
    align-items: center;
    justify-content: center;
    transition: all 0.1s ease;
    border: 2px solid #ff3b3b;
  }

  #edgeValue {
    color: white;
  }

  #earlyText {
    margin-top: 35px;
    font-size: 0.85rem;
    padding: 6px 10px;
    border: 1px solid #ff3b3b;
    border-radius: 6px;
    color: #aaa;
  }

  #overlay {
    position: absolute;
    top: 0;
    left: 0;
  }
</style>
</head>

<body>

<div id="content">

  <div id="topInfo">
    <div id="coinLine">💲️: --/--</div>
    <div id="senderLine">👨‍✈️: ---</div>
  </div>

  <div id="countdown">--:--:---</div>
  <div id="message">Sandık açılmasına kalan süre</div>

  <div id="edgeBox">
    <span id="edgeValue">-- ms</span>
  </div>

  <div id="earlyText">Erken açılması gereken süre</div>

</div>

<svg id="overlay"></svg>

<script>
const params = new URLSearchParams(window.location.search);

const timestampParam = Number(params.get("timestamp"));
const unpackAtParam = Number(params.get("unpack_at"));
const edgeParam = params.get("edge");
const coinParam = params.get("coin");
const recipientsParam = params.get("recipients");
const senderParam = params.get("sender");

const coinLine = document.getElementById("coinLine");
const senderLine = document.getElementById("senderLine");

if (coinParam && recipientsParam) {
    coinLine.textContent = `💲️: ${coinParam}/${recipientsParam}`;
}

if (senderParam) {
    senderLine.textContent = `👨‍✈️: ${senderParam}`;
}

const cd = document.getElementById("countdown");
const msg = document.getElementById("message");
const edgeBox = document.getElementById("edgeBox");
const edgeValue = document.getElementById("edgeValue");
const earlyText = document.getElementById("earlyText");
const overlay = document.getElementById("overlay");

if (!timestampParam || !unpackAtParam) {
    cd.textContent = "❌ Eksik parametre!";
    msg.textContent = "timestamp ve unpack_at parametreleri gerekli!";
    throw new Error("Eksik parametreler!");
}

history.replaceState({}, document.title, window.location.pathname);

function measureEdgeGidisImage(ip, timeout = 1800) {
    return new Promise(resolve => {
        const img = new Image();
        const url = "https://" + ip + "/probe.png?cb=" + Math.random();
        const start = performance.now();
        let ended = false;
        const end = () => {
            if (ended) return;
            ended = true;
            resolve(performance.now() - start);
        };
        img.onload = end;
        img.onerror = end;
        img.src = url;
        setTimeout(end, timeout);
    });
}

let edgeMs = null;
const leadTime = 120;
let flashDone = false;

if (edgeParam) {
    (async () => {
        const ip = edgeParam.replace(":443", "");
        const measured = await measureEdgeGidisImage(ip, 1800);
        edgeMs = measured;
        edgeValue.textContent = `${Math.round(edgeMs)} ms`;
        edgeBox.style.display = "flex";
        drawOverlay();
    })();
}

const unpackAtMs = unpackAtParam * 1000;

function triggerSingleFlash() {
    edgeBox.style.background = "#ff0000";
    edgeBox.style.boxShadow = "0 0 25px 20px #ff0000";
    edgeBox.style.transform = "scale(1.15)";
    setTimeout(() => {
        edgeBox.style.background = "#111";
        edgeBox.style.boxShadow = "none";
        edgeBox.style.transform = "scale(1)";
    }, 120);
}

function drawOverlay() {
    overlay.innerHTML = "";
    overlay.setAttribute("width", window.innerWidth);
    overlay.setAttribute("height", window.innerHeight);

    const earlyRect = earlyText.getBoundingClientRect();
    const edgeRect = edgeBox.getBoundingClientRect();

    const startX = earlyRect.left + earlyRect.width/2;
    const startY = earlyRect.top;
    const endX = edgeRect.left + edgeRect.width/2;
    const endY = edgeRect.top + edgeRect.height;

    const line = document.createElementNS("http://www.w3.org/2000/svg","line");
    line.setAttribute("x1", startX);
    line.setAttribute("y1", startY);
    line.setAttribute("x2", endX);
    line.setAttribute("y2", endY);
    line.setAttribute("stroke","#ff3b3b");
    line.setAttribute("stroke-width","2");
    overlay.appendChild(line);
}

function update() {
    const nowMs = Date.now();
    const remaining = unpackAtMs - nowMs;

    if (remaining <= 0) {
        cd.textContent = "00:00:000";
        msg.textContent = "🎉 Sandık açıldı!";
        setTimeout(() => {
            window.open('', '_self');
            window.close();
        }, 500);
        return;
    }

    const minutes = String(Math.floor(remaining / 60000)).padStart(2,'0');
    const seconds = String(Math.floor((remaining / 1000) % 60)).padStart(2,'0');
    const milliseconds = String(Math.floor(remaining % 1000)).padStart(3,'0');

    cd.textContent = `${minutes}:${seconds}:${milliseconds}`;

    if (edgeMs !== null && !flashDone && remaining <= (edgeMs + leadTime)) {
        flashDone = true;
        triggerSingleFlash();
    }

    drawOverlay();
    requestAnimationFrame(update);
}

window.addEventListener("resize", drawOverlay);
update();
</script>

</body>
</html>
